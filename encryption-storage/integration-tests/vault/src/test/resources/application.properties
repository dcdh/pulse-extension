quarkus.application.name=TodoTaking_Todo
quarkus.compose.devservices.enabled=true
quarkus.vault.devservices.image-name=openbao/openbao:2.5.4
quarkus.vault.authentication.userpass.username=bob
quarkus.vault.authentication.userpass.password=sinclair
# Ensure the client token is not set because the root value will be used.
# The root value is bound with the vault dev service and is used for authentication purposes.
# It will not work with our custom version using openbao and lead to 403 forbidden errors.
quarkus.vault.authentication.client-token=
