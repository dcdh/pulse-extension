quarkus.application.name=TodoTaking

quarkus.datasource.devservices.reuse=false
quarkus.compose.devservices.follow-container-logs=true
# Makes Aggregate and other fromApplication pulse-core in tests discoverable
# doing combinedIndexBuildItem.getIndex().getAllKnownImplementations(AggregateId.class) will return TodoId from pulse-core test
quarkus.index-dependency.pulse-core-tests.group-id=com.damdamdeo.pulse
quarkus.index-dependency.pulse-core-tests.artifact-id=pulse-core
quarkus.index-dependency.pulse-core-tests.classifier=tests
